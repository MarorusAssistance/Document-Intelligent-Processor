name: CI — Infra

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Bicep lint & what-if
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep build (compile check)
        run: az bicep build --file infra/main.bicep --outfile /dev/null

      - name: What-if preview (dev)
        run: |
          az deployment sub what-if \
            --name "ci-whatif-${{ github.run_id }}" \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam
