name: CD — Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: crdocprocdevweu   # matches naming.bicep output for dev
  CONTAINER_APP_NAME: ca-docproc-api-dev-weu
  RESOURCE_GROUP: rg-docproc-dev-weu

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/document-processor-api"
          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            backend/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Update Container App
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/document-processor-api:${{ github.sha }}"
          az containerapp update \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${IMAGE}"
