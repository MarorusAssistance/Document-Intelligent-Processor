name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/api/openapi.json"
  pull_request:
    paths:
      - "frontend/**"
      - "docs/api/openapi.json"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Download OpenAPI artifact (if available)
        uses: dawidd6/action-download-artifact@v7
        with:
          name: openapi-schema
          path: docs/api/
          if_no_artifact_found: ignore

      - name: Generate API types (if openapi.json exists)
        run: |
          if [ -f "../docs/api/openapi.json" ]; then
            npm run generate-types
          else
            echo "openapi.json not found — skipping type generation (run ci-backend first)"
          fi

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_AZURE_CLIENT_ID: "placeholder"
          NEXT_PUBLIC_AZURE_TENANT_ID: "placeholder"
          NEXT_PUBLIC_AZURE_AUTHORITY: "https://login.microsoftonline.com/placeholder"
        run: npm run build 2>/dev/null || npx next build
